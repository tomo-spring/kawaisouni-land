<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap"
    rel="stylesheet">
  <title>んぽちゃむルンバ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    /* Result screen - retro game style */
    #result-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      background: #1d2b53;
      background-image: radial-gradient(circle at 50% 50%, #29366f 0%, #1d2b53 70%);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'DotGothic16', 'Courier New', monospace;
    }
    #result-screen.active { display: flex; }
    .result-panel {
      background: #0f0f23;
      border: 6px solid #29adff;
      padding: 36px 50px;
      max-width: 700px;
      width: 85%;
      text-align: center;
      box-shadow: 8px 8px 0 #000, 0 0 30px rgba(41,173,255,0.3);
      position: relative;
    }
    .result-panel::before,
    .result-panel::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      background: #29adff;
    }
    .result-panel::before { top: -3px; left: -3px; }
    .result-panel::after { top: -3px; right: -3px; }
    .result-panel h2 {
      font-size: 42px;
      color: #29adff;
      margin: 0 0 8px;
      text-shadow: 2px 2px 0 #000;
    }
    .result-time {
      font-size: 36px;
      font-weight: bold;
      color: #ff004d;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 #000;
    }
    .result-rank-label {
      font-size: 24px;
      color: #ffec27;
      margin-bottom: 16px;
      text-shadow: 2px 2px 0 #000;
    }
    #name-input-area-r {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
    }
    #name-input-area-r.active { display: flex; }
    #name-input-area-r h3 {
      font-size: 32px;
      color: #ffa300;
      margin: 0 0 8px;
      text-shadow: 2px 2px 0 #000;
      animation: rank-blink-text 0.8s infinite;
    }
    @keyframes rank-blink-text {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    #name-input-area-r .rank-subtitle {
      font-size: 18px;
      color: #c2c3c7;
      margin-bottom: 12px;
      text-shadow: 1px 1px 0 #000;
    }
    .rank-slots {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .rank-slot {
      font-family: 'DotGothic16', 'Courier New', monospace;
      font-size: 40px;
      font-weight: 900;
      width: 56px;
      height: 60px;
      line-height: 60px;
      text-align: center;
      border: 4px solid #29adff;
      background: #1d2b53;
      color: #fff1e8;
      text-shadow: 1px 1px 0 #000;
    }
    .rank-slot.active {
      border-color: #ffec27;
      box-shadow: 0 0 10px rgba(255,236,39,0.5);
      animation: rank-blink 0.6s infinite;
    }
    @keyframes rank-blink {
      0%, 100% { border-color: #ffec27; }
      50% { border-color: #29adff; }
    }
    .rank-hint {
      font-size: 13px;
      color: #83769c;
      margin-bottom: 12px;
      text-shadow: 1px 1px 0 #000;
    }
    .rank-btn {
      font-family: 'DotGothic16', 'Courier New', monospace;
      font-size: 22px;
      font-weight: bold;
      padding: 8px 36px;
      background: #00e436;
      color: #0f0f23;
      border: 4px solid #008751;
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.1s;
    }
    .rank-btn:hover { transform: scale(1.05); }
    .rank-btn:active {
      transform: translateY(2px);
      box-shadow: 2px 2px 0 #000;
    }
    #ranking-list-area {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
    }
    #ranking-list-area.active { display: flex; }
    #ranking-list-area h4 {
      font-size: 28px;
      color: #ffa300;
      margin: 0 0 8px;
      text-shadow: 2px 2px 0 #000;
    }
    #ranking-list-area ol {
      list-style: none;
      padding: 0;
      margin: 0 auto 12px;
      text-align: center;
    }
    #ranking-list-area li {
      font-family: 'DotGothic16', 'Courier New', monospace;
      font-size: 20px;
      color: #c2c3c7;
      padding: 3px 0;
      text-shadow: 1px 1px 0 #000;
    }
    #ranking-list-area li.hl {
      color: #ffec27;
      font-weight: bold;
      animation: rank-blink-text 0.6s infinite;
    }
    .result-home {
      display: inline-block;
      font-family: 'DotGothic16', 'Courier New', monospace;
      font-size: 20px;
      padding: 8px 24px;
      background: transparent;
      color: #5f574f;
      border: none;
      cursor: pointer;
      text-decoration: none;
      text-shadow: 1px 1px 0 #000;
      animation: rank-blink-text 1.2s infinite;
    }
    .result-home:hover {
      color: #ffec27;
    }

    .home-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 50;
      font-family: 'DotGothic16', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 900;
      padding: 6px 12px;
      background: #1d2b53;
      color: #c2c3c7;
      border: 3px solid #29adff;
      cursor: pointer;
      text-decoration: none;
      display: none;
      align-items: center;
      gap: 6px;
      text-shadow: 1px 1px 0 #000;
      box-shadow: 3px 3px 0 #000;
      transition: color 0.2s, border-color 0.2s;
    }
    .home-btn.visible {
      display: flex;
    }
    .home-btn:hover {
      color: #ffec27;
      border-color: #ffec27;
    }
    .home-btn:active {
      transform: translateY(2px);
      box-shadow: 1px 1px 0 #000;
    }
    .home-btn.kb-selected {
      outline: 3px solid #00ff00;
      outline-offset: 2px;
      box-shadow: 0 0 12px #00ff00;
    }
  </style>
</head>

<body>
  <a href="../" class="home-btn">← ホームへ</a>
  <canvas id="c"></canvas>
  <div id="result-screen">
    <div class="result-panel">
      <h2>- 結果 -</h2>
      <div class="result-time" id="result-time"></div>
      <div class="result-rank-label" id="result-rank-label"></div>

      <div id="name-input-area-r">
        <h3>ハイスコア!</h3>
        <div class="rank-subtitle">名前を入力してください</div>
        <div class="rank-slots">
          <div class="rank-slot active" data-index="0">A</div>
          <div class="rank-slot" data-index="1">A</div>
          <div class="rank-slot" data-index="2">A</div>
        </div>
        <div class="rank-hint">↑↓: 文字選択　←→: 移動　Enter: 決定</div>
        <button class="rank-btn" id="rank-submit">決定</button>
      </div>

      <div id="ranking-list-area">
        <h4>- ランキング -</h4>
        <ol id="ranking-list-ol"></ol>
      </div>

    </div>
  </div>
  <script>
// === config.js ===
const config = {
  GW: 960,
  GH: 540,
  RUMBA_RADIUS: 30,
  RUMBA_MAX_SPEED: 1.5,
  RUMBA_ACCEL: 0.2,
  RUMBA_FRICTION: 0.86,
  CHAR_SIZE: 90,
  CHAR_FRICTION: 0.90,
  CHAR_STAND_H: 150,
  ATTACH_RANGE: 105,
  DETACH_RANGE: 200,
  SLIP_DURATION_SEC: 0.40,
  REATTACH_COOLDOWN_SEC: 0.25,
  DRAG_ANIM_FRAMES: 6,
  DRAG_ANIM_INTERVAL: 0.03,
  DRAG_ANIM_DURATION: 6 * 0.03,
  DRAG_DRAW_SIZE: 160,
  MACARON_DRAW_H: 40,
  MACARON_ATTRACT_FORCE: 0.35,
  TOTAL_MACARONS: 5,
  MACARON_SPEED: 0.8,
  DRAG_SPEED_BASE: 8,
  DRAG_SPEED_PENALTY: 2.5,
  CHAR_SIZE_GROW: 60,
  TOUCH_DEAD: 15,
  TOUCH_MAX: 80,
  WALL_COLOR: "#d4c4b8",
  WALL_BORDER: "#b89d88",
  MACARON_IMAGE_NAMES: ["makaron.png", "makaron2.png", "makaron3.png"],
  IMAGE_NAMES: [
    "ルンバ.png",
    "main.png",
    "dragging-1.png",
    "dragging-2.png",
    "dragging-3.png",
    "dragging-4.png",
    "dragging-5.png",
    "dragging-6.png",
    "dragging-7.png",
    "makaron.png",
    "makaron2.png",
    "makaron3.png",
    "goal.png",
    "gameover-image.png",
  ],
};

// === utils.js ===
function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function vecLen(x, y) {
  return Math.hypot(x, y);
}

function normalize(x, y) {
  const length = vecLen(x, y);
  return length === 0 ? [0, 0] : [x / length, y / length];
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function rectsCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function circleRectCollide(cx, cy, cr, rect) {
  const nx = clamp(cx, rect.x, rect.x + rect.w);
  const ny = clamp(cy, rect.y, rect.y + rect.h);
  const dx = cx - nx;
  const dy = cy - ny;
  return { hit: dx * dx + dy * dy <= cr * cr, dx, dy };
}

function resolveCircleRect(cx, cy, cr, vx, vy, rect) {
  const { hit, dx, dy } = circleRectCollide(cx, cy, cr, rect);
  if (!hit) return { cx, cy, vx, vy };

  const distance = Math.hypot(dx, dy);
  let nxDir;
  let nyDir;

  if (distance === 0) {
    const left = Math.abs(cx - rect.x);
    const right = Math.abs(rect.x + rect.w - cx);
    const top = Math.abs(cy - rect.y);
    const bottom = Math.abs(rect.y + rect.h - cy);
    const minSide = Math.min(left, right, top, bottom);

    if (minSide === left) { nxDir = -1; nyDir = 0; }
    else if (minSide === right) { nxDir = 1; nyDir = 0; }
    else if (minSide === top) { nxDir = 0; nyDir = -1; }
    else { nxDir = 0; nyDir = 1; }

    cx += nxDir * cr;
    cy += nyDir * cr;
    if (nxDir !== 0) vx *= -0.3;
    if (nyDir !== 0) vy *= -0.3;
    return { cx, cy, vx, vy };
  }

  nxDir = dx / distance;
  nyDir = dy / distance;
  cx += nxDir * (cr - distance);
  cy += nyDir * (cr - distance);

  const vn = vx * nxDir + vy * nyDir;
  if (vn < 0) {
    vx -= 1.3 * vn * nxDir;
    vy -= 1.3 * vn * nyDir;
    vx *= 0.75;
    vy *= 0.75;
  }

  return { cx, cy, vx, vy };
}

function rectRectResolve(moving, vx, vy, solid) {
  if (!rectsCollide(moving, solid)) return { r: moving, vx, vy };

  if (vx > 0) { moving.x = solid.x - moving.w; vx *= -0.2; }
  else if (vx < 0) { moving.x = solid.x + solid.w; vx *= -0.2; }

  if (rectsCollide(moving, solid)) {
    if (vy > 0) { moving.y = solid.y - moving.h; vy *= -0.2; }
    else if (vy < 0) { moving.y = solid.y + solid.h; vy *= -0.2; }
  }

  return { r: moving, vx, vy };
}

function circleCircleResolve(cx, cy, cr, vx, vy, ox, oy, orad) {
  const dx = cx - ox;
  const dy = cy - oy;
  const distance = Math.hypot(dx, dy);

  if (distance < cr + orad) {
    const [nx, ny] = distance === 0 ? [1, 0] : [dx / distance, dy / distance];
    cx += nx * (cr + orad - distance);
    cy += ny * (cr + orad - distance);

    const vn = vx * nx + vy * ny;
    if (vn < 0) {
      vx -= 1.3 * vn * nx;
      vy -= 1.3 * vn * ny;
      vx *= 0.75;
      vy *= 0.75;
    }
  }

  return { cx, cy, vx, vy };
}

function resolveCharCircle(cx, cy, cw, ch, vx, vy, ox, oy, orad) {
  const closestX = clamp(ox, cx, cx + cw);
  const closestY = clamp(oy, cy, cy + ch);
  const dx = closestX - ox;
  const dy = closestY - oy;
  const distance = Math.hypot(dx, dy);

  if (distance < orad) {
    const [nx, ny] = distance === 0 ? [1, 0] : [dx / distance, dy / distance];
    cx += nx * (orad - distance);
    cy += ny * (orad - distance);

    const vn = vx * nx + vy * ny;
    if (vn < 0) {
      vx -= 1.3 * vn * nx;
      vy -= 1.3 * vn * ny;
      vx *= 0.75;
      vy *= 0.75;
    }
  }

  return { cx, cy, vx, vy };
}

// === state.js ===
function createState() {
  return {
    viewport: { scale: 1, offsetX: 0, offsetY: 0, dpr: 1 },
    gameState: "title",
    rumbaX: 0, rumbaY: 0, rumbaVX: 0, rumbaVY: 0,
    rumbaFacingX: 1, rumbaFacingY: 0, dragFlipped: false,
    charX: 0, charY: 0, charVX: 0, charVY: 0,
    attached: false, hasBeenAttached: false,
    slipTimer: 0, reattachCooldown: 0, elapsedTime: 0,
    macarons: [], collectionEffects: [], ropePoints: [],
    screenShake: 0, dragAnimTimer: 0,
    gameOverTime: 0, clearTime: 0, macaronsEaten: 0,
    bestTime: parseFloat(localStorage.getItem("npochamu_best") || "0"),
    cryingTimer: 0, cryingTimerActive: false,
    particles: [], lastTime: 0,
  };
}

// === particles.js ===
function spawnParticles(state, x, y, color, count, speed, lifetime) {
  count = count || 10; speed = speed || 3.0; lifetime = lifetime || 0.5;
  for (let i = 0; i < count; i += 1) {
    const angle = Math.random() * Math.PI * 2;
    const velocity = speed * (0.5 + Math.random() * 0.5);
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * velocity, vy: Math.sin(angle) * velocity,
      color, life: lifetime, maxLife: lifetime, size: 2 + Math.random() * 4,
    });
  }
}

function spawnConfetti(state, count) {
  count = count || 50;
  const colors = ["#ff6b6b", "#51cf66", "#339af0", "#fcc419", "#cc5de8", "#22b8cf", "#ff922b"];
  for (let i = 0; i < count; i += 1) {
    const angle = Math.PI * 0.25 + Math.random() * Math.PI * 0.5;
    const speed = 2 + Math.random() * 4;
    state.particles.push({
      x: Math.random() * config.GW,
      y: -20 + Math.random() * (config.GH / 3 + 20),
      vx: Math.cos(angle) * speed * (Math.random() < 0.5 ? -1 : 1),
      vy: Math.sin(angle) * speed,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 2.0, maxLife: 2.0, size: 3 + Math.random() * 5,
    });
  }
}

function updateParticles(state, dt) {
  for (const particle of state.particles) {
    particle.x += particle.vx;
    particle.y += particle.vy;
    particle.vy += 1.5;
    particle.life -= dt;
  }
  state.particles = state.particles.filter(function(p) { return p.life > 0; });
}

function drawParticles(state, ctx) {
  for (const particle of state.particles) {
    const alpha = Math.max(0, particle.life / particle.maxLife);
    const size = Math.max(1, particle.size * alpha);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = particle.color;
    ctx.beginPath();
    ctx.arc(particle.x, particle.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === player.js ===
function charSize(state) {
  return config.CHAR_SIZE + state.macaronsEaten * config.CHAR_SIZE_GROW;
}

function charDrawSize(state) {
  return config.DRAG_DRAW_SIZE + state.macaronsEaten * config.CHAR_SIZE_GROW;
}

function charStandH(state) {
  return config.CHAR_STAND_H + state.macaronsEaten * config.CHAR_SIZE_GROW;
}

function charStandW(state) {
  return Math.floor(charStandH(state) * (1728 / 2466));
}

function currentDragFrameName(state) {
  if (state.dragAnimTimer > 0) {
    const elapsed = config.DRAG_ANIM_DURATION - state.dragAnimTimer;
    const frameIdx = Math.min(config.DRAG_ANIM_FRAMES - 1, Math.floor(elapsed / config.DRAG_ANIM_INTERVAL));
    return "dragging-" + (frameIdx + 1) + ".png";
  }
  return "dragging-7.png";
}

function dragDrawRect(state, images, x, y) {
  if (x === undefined) x = state.charX;
  if (y === undefined) y = state.charY;
  const cs = charSize(state);
  const drawSize = charDrawSize(state);
  const frameName = currentDragFrameName(state);
  const img = images[frameName];
  let width = cs;
  let height = cs;

  if (img && img.naturalWidth > 0 && img.naturalHeight > 0) {
    const aspect = img.naturalWidth / img.naturalHeight;
    if (aspect >= 1) { width = drawSize; height = Math.floor(drawSize / aspect); }
    else { height = drawSize; width = Math.floor(drawSize * aspect); }
  }

  const dx = (cs - width) / 2;
  const dy = cs - height;
  return { frameName, x: x + dx, y: y + dy, w: width, h: height, dx, dy };
}

// === terrain.js ===
var OBSTACLES = [];
var EXIT_RECT = { x: config.GW - 110, y: config.GH - 110, w: 110, h: 110 };

function generateMacarons() {
  var macarons = [];
  for (var i = 0; i < config.TOTAL_MACARONS; i += 1) {
    for (var tries = 0; tries < 300; tries += 1) {
      var mx = 40 + Math.random() * (config.GW - 80);
      var my = 40 + Math.random() * (config.GH - 80);
      var macaronRect = { x: mx - 20, y: my - 20, w: 40, h: 40 };

      var ok = !rectsCollide(macaronRect, EXIT_RECT);
      if (ok) {
        for (var oi = 0; oi < OBSTACLES.length; oi++) {
          var obstacle = OBSTACLES[oi];
          if (obstacle.shape === "rect" && rectsCollide(macaronRect, obstacle.rect)) { ok = false; break; }
          if (obstacle.shape === "circle" && vecLen(mx - obstacle.pos[0], my - obstacle.pos[1]) < obstacle.radius + 30) { ok = false; break; }
        }
      }

      if (ok) {
        for (var ei = 0; ei < macarons.length; ei++) {
          if (vecLen(mx - macarons[ei].pos[0], my - macarons[ei].pos[1]) < 50) { ok = false; break; }
        }
      }

      if (!ok) continue;

      var angle = Math.random() * Math.PI * 2;
      macarons.push({
        pos: [mx, my],
        vx: Math.cos(angle) * config.MACARON_SPEED,
        vy: Math.sin(angle) * config.MACARON_SPEED,
        imgIdx: Math.floor(Math.random() * config.MACARON_IMAGE_NAMES.length),
      });
      break;
    }
  }
  return macarons;
}

function macaronRadius(images, imgIdx) {
  var img = images[config.MACARON_IMAGE_NAMES[imgIdx]];
  if (!img) return 20;
  var scale = config.MACARON_DRAW_H / img.naturalHeight;
  return (img.naturalWidth * scale) / 2;
}

// === assets.js ===
function createAssets() {
  var images = {};
  function loadImages(callback) {
    if (config.IMAGE_NAMES.length === 0) { callback(); return; }
    var loadedCount = 0;
    function done() { loadedCount += 1; if (loadedCount >= config.IMAGE_NAMES.length) callback(); }
    for (var i = 0; i < config.IMAGE_NAMES.length; i++) {
      var img = new Image();
      img.onload = (function(name, im) { return function() { images[name] = im; done(); }; })(config.IMAGE_NAMES[i], img);
      img.onerror = done;
      img.src = "images/" + encodeURIComponent(config.IMAGE_NAMES[i]);
    }
  }
  return { images: images, loadImages: loadImages };
}

// === audio.js ===
function createAudioController(state) {
  var audioCtx = null;
  var cryingAudio = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  }

  function playTone(freqStart, freqEnd, duration, volume, type) {
    volume = volume || 0.3; type = type || "sine";
    ensureAudio();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playSlip() { playTone(600, 300, 0.15, 0.15, "triangle"); }

  function onCryingEnded() {
    if (!state.attached) return;
    state.attached = false;
    state.slipTimer = config.SLIP_DURATION_SEC;
    state.reattachCooldown = config.REATTACH_COOLDOWN_SEC;
    playSlip();
    state.screenShake = 0.12;
  }

  function initCryingAudio() {
    if (cryingAudio) return;
    cryingAudio = new Audio("images/crying.wav");
    cryingAudio.loop = false;
    cryingAudio.addEventListener("ended", onCryingEnded);
  }

  function startCrying() {
    initCryingAudio();
    if (!cryingAudio.paused) return;
    cryingAudio.currentTime = 0;
    cryingAudio.play().catch(function() {});
    if (state.cryingTimerActive) return;
    var duration = cryingAudio.duration;
    state.cryingTimer = Number.isFinite(duration) && duration > 0 ? duration : 3;
    state.cryingTimerActive = true;
  }

  function stopCrying() {
    if (cryingAudio && !cryingAudio.paused) { cryingAudio.pause(); cryingAudio.currentTime = 0; }
    state.cryingTimer = 0;
    state.cryingTimerActive = false;
  }

  function playConnect() { playTone(400, 800, 0.1, 0.2); }

  function playCollect() {
    ensureAudio();
    playTone(523, 523, 0.1, 0.15);
    setTimeout(function() { playTone(659, 659, 0.1, 0.15); }, 100);
  }

  function playClear() {
    ensureAudio();
    [523, 659, 784, 1047].forEach(function(freq, index) {
      setTimeout(function() { playTone(freq, freq, 0.15, 0.2); }, index * 130);
    });
  }

  return { ensureAudio, startCrying, stopCrying, playConnect, playSlip, playCollect, playClear };
}

// === input.js ===
function createInput(opts) {
  var canvas = opts.canvas, state = opts.state, audio = opts.audio;
  var onKeyDown = opts.onKeyDown, onResetGame = opts.onResetGame;
  var keys = {};
  var touch = { active: false, startX: 0, startY: 0, dx: 0, dy: 0 };

  document.addEventListener("keydown", function(event) {
    keys[event.code] = true;
    onKeyDown(event.code);
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) event.preventDefault();
  });

  document.addEventListener("keyup", function(event) { keys[event.code] = false; });

  canvas.addEventListener("pointerdown", function(event) {
    audio.ensureAudio();
    if (state.gameState === "title") { state.gameState = "howto"; return; }
    if (state.gameState === "howto") { onResetGame(); return; }
    if ((state.gameState === "cleared" || state.gameState === "gameover") && !document.getElementById('result-screen').classList.contains('active')) { window.location.href = "../"; return; }
    if (state.gameState === "paused") { state.gameState = "playing"; return; }
    touch.active = true; touch.startX = event.clientX; touch.startY = event.clientY; touch.dx = 0; touch.dy = 0;
  });

  canvas.addEventListener("pointermove", function(event) {
    if (!touch.active) return;
    touch.dx = event.clientX - touch.startX;
    touch.dy = event.clientY - touch.startY;
  });

  function resetTouch() { touch.active = false; touch.dx = 0; touch.dy = 0; }
  canvas.addEventListener("pointerup", resetTouch);
  canvas.addEventListener("pointercancel", resetTouch);

  return { keys: keys, touch: touch };
}

        ctx.fillStyle = "#ff004d"; ctx.fillText("\u98df\u3079\u3059\u304e\u305f\u3061\u3083\u3080\uff5e", GW / 2, GH / 2 - h / 2 - 55);
      }
      ctx.globalAlpha = 1;
    }

    // ゴール画像
    var goalImg = images["goal.png"];
    var goalAlpha = clamp((elapsed - 5.0) / 0.8, 0, 1);
    if (goalAlpha > 0 && goalImg) {
      ctx.globalAlpha = goalAlpha;
      ctx.drawImage(goalImg, EXIT_RECT.x, EXIT_RECT.y, EXIT_RECT.w, EXIT_RECT.h);

      var messageAlpha = clamp((elapsed - 6.0) / 1.0, 0, 1);
      if (messageAlpha > 0) {
        ctx.globalAlpha = messageAlpha;
        ctx.font = pf(Math.floor(GW * 0.022));
        ctx.fillStyle = "#83769c";
        ctx.fillText("\u30fb\u30fb\u30fb\u305f\u304f\u3002\u304a\u307e\u3048\u306a\u3042", EXIT_RECT.x + EXIT_RECT.w / 2 - 70, EXIT_RECT.y - 20);
      }
      ctx.globalAlpha = 1;
    }

    if (darkAlpha > 0.5) drawScanlines();
  }

  function draw(now) {
    ctx.setTransform(state.viewport.dpr, 0, 0, state.viewport.dpr, 0, 0);
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    var shakeX = 0, shakeY = 0;
    if (state.screenShake > 0) {
      shakeX = (Math.random() - 0.5) * 8 * (state.screenShake / 0.15);
      shakeY = (Math.random() - 0.5) * 8 * (state.screenShake / 0.15);
    }

    ctx.setTransform(
      state.viewport.scale * state.viewport.dpr, 0, 0,
      state.viewport.scale * state.viewport.dpr,
      (state.viewport.offsetX + shakeX * state.viewport.scale) * state.viewport.dpr,
      (state.viewport.offsetY + shakeY * state.viewport.scale) * state.viewport.dpr
    );

    if (state.gameState === "title") { drawTitleScreen(now); return; }
    if (state.gameState === "howto") { drawHowtoScreen(now); return; }

    // レトロ風背景 + グリッド
    ctx.fillStyle = "#1d2b53"; ctx.fillRect(0, 0, GW, GH);
    ctx.strokeStyle = "rgba(41,173,255,0.08)"; ctx.lineWidth = 1;
    for (var gx = 0; gx < GW; gx += 16) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, GH); ctx.stroke(); }
    for (var gy = 0; gy < GH; gy += 16) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(GW, gy); ctx.stroke(); }

    if (state.gameState !== "gameover") drawHUD();

    for (var mi = 0; mi < state.macarons.length; mi++) {
      var macaron = state.macarons[mi];
      var imgName = MACARON_IMAGE_NAMES[macaron.imgIdx];
      var mImg = images[imgName];
      if (mImg) {
        var sc = 40 / mImg.naturalHeight;
        var mw = mImg.naturalWidth * sc;
        ctx.drawImage(mImg, macaron.pos[0] - mw / 2, macaron.pos[1] - 20, mw, 40);
      } else {
        ctx.fillStyle = "#ff6b6b"; ctx.beginPath();
        ctx.arc(macaron.pos[0], macaron.pos[1], 8, 0, Math.PI * 2); ctx.fill();
      }
    }

    var goalImg = images["goal.png"];
    if (goalImg) { ctx.drawImage(goalImg, EXIT_RECT.x, EXIT_RECT.y, EXIT_RECT.w, EXIT_RECT.h); }
    else { roundRect(EXIT_RECT.x, EXIT_RECT.y, EXIT_RECT.w, EXIT_RECT.h, 14, "rgb(60,200,120)");
      ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "bold 34px sans-serif";
      ctx.fillStyle = "#fff"; ctx.fillText("GOAL", EXIT_RECT.x + EXIT_RECT.w / 2, EXIT_RECT.y + EXIT_RECT.h / 2);
    }

    for (var oi = 0; oi < OBSTACLES.length; oi++) {
      if (OBSTACLES[oi].shape !== "rect") continue;
      var r = OBSTACLES[oi].rect;
      ctx.fillStyle = WALL_COLOR; ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = WALL_BORDER; ctx.lineWidth = 1.5; ctx.strokeRect(r.x, r.y, r.w, r.h);
    }

    var cs = charSize(state);
    var standHeight = charStandH(state);
    var standWidth = charStandW(state);
    if (state.gameState === "gameover" || state.gameState === "cleared") {
      // overlay draws character
    } else if (state.attached) {
      var dRect = dragDrawRect(state, images);
      if (images[dRect.frameName]) { drawImg(dRect.frameName, dRect.x, dRect.y, dRect.w, dRect.h, false); }
      else { roundRect(state.charX, state.charY, cs, cs, 10, "rgb(255,170,80)"); }
    } else {
      var cdx = (cs - standWidth) / 2; var cdy = cs - standHeight;
      if (!drawImg("main.png", state.charX + cdx, state.charY + cdy, standWidth, standHeight)) {
        roundRect(state.charX, state.charY, cs, cs, 10, "rgb(255,170,80)");
      }
    }

    if (!drawImg("\u30eb\u30f3\u30d0.png", state.rumbaX - config.RUMBA_RADIUS, state.rumbaY - config.RUMBA_RADIUS, config.RUMBA_RADIUS * 2, config.RUMBA_RADIUS * 2)) {
      ctx.fillStyle = "rgb(240,240,255)"; ctx.beginPath();
      ctx.arc(state.rumbaX, state.rumbaY, config.RUMBA_RADIUS, 0, Math.PI * 2); ctx.fill();
    }

    drawParticles(state, ctx);

    if (state.gameState === "paused") drawPauseOverlay();
    else if (state.gameState === "cleared") drawClearOverlay(now);
    else if (state.gameState === "gameover") drawGameOverOverlay(now);

    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  }

  return { resize: resize, draw: draw };
}

// === game.js ===
function createGame(opts) {
  var state = opts.state, images = opts.images, audio = opts.audio, input = opts.input;

  function handleKeyDown(code) {
    audio.ensureAudio();
    if (state.gameState === "title") { if (code === "Space") state.gameState = "howto"; return; }
    if (state.gameState === "howto") { if (code === "Space") resetGame(); return; }
    if (state.gameState === "playing") {
      if (code === "Escape" || code === "KeyP") state.gameState = "paused";
      return;
    }
    if (state.gameState === "paused") {
      if (code === "Escape" || code === "KeyP") state.gameState = "playing";
      return;
    }
    if (state.gameState === "cleared" || state.gameState === "gameover") {
      if (document.getElementById('result-screen').classList.contains('active')) return;
      if (code === "Space" || code === "Escape") window.location.href = "../";
    }
  }

  function resetGame() {
    state.rumbaX = 150; state.rumbaY = config.GH - 150;
    state.rumbaVX = 0; state.rumbaVY = 0;
    state.rumbaFacingX = 1; state.rumbaFacingY = 0; state.dragFlipped = false;
    state.charX = 100; state.charY = 100; state.charVX = 0; state.charVY = 0;
    state.attached = false; state.hasBeenAttached = false;
    state.slipTimer = 0; state.reattachCooldown = 0; state.elapsedTime = 0;
    state.macarons = generateMacarons();
    state.collectionEffects = []; state.particles = []; state.ropePoints = [];
    state.screenShake = 0; state.dragAnimTimer = 0; state.macaronsEaten = 0;
    state.cryingTimer = 0; state.cryingTimerActive = false;
    state.gameState = "playing";
  }

  function updateEffects(dt) {
    for (var i = 0; i < state.collectionEffects.length; i++) state.collectionEffects[i].timer -= dt;
    state.collectionEffects = state.collectionEffects.filter(function(e) { return e.timer > 0; });
  }

  function update(dt) {
    if (state.gameState !== "playing") {
      audio.stopCrying(); updateParticles(state, dt); updateEffects(dt); return;
    }

    state.elapsedTime += dt;
    if (state.slipTimer > 0) state.slipTimer = Math.max(0, state.slipTimer - dt);
    if (state.reattachCooldown > 0) state.reattachCooldown = Math.max(0, state.reattachCooldown - dt);
    if (state.screenShake > 0) state.screenShake = Math.max(0, state.screenShake - dt);
    if (state.dragAnimTimer > 0) state.dragAnimTimer = Math.max(0, state.dragAnimTimer - dt);

    var ax = 0, ay = 0;
    if (input.keys["ArrowLeft"] || input.keys["KeyA"]) ax -= config.RUMBA_ACCEL;
    if (input.keys["ArrowRight"] || input.keys["KeyD"]) ax += config.RUMBA_ACCEL;
    if (input.keys["ArrowUp"] || input.keys["KeyW"]) ay -= config.RUMBA_ACCEL;
    if (input.keys["ArrowDown"] || input.keys["KeyS"]) ay += config.RUMBA_ACCEL;

    if (input.touch.active) {
      var magnitude = Math.hypot(input.touch.dx, input.touch.dy);
      if (magnitude > config.TOUCH_DEAD) {
        var ratio = Math.min(1, (magnitude - config.TOUCH_DEAD) / (config.TOUCH_MAX - config.TOUCH_DEAD));
        ax += (input.touch.dx / magnitude) * config.RUMBA_ACCEL * ratio;
        ay += (input.touch.dy / magnitude) * config.RUMBA_ACCEL * ratio;
      }
    }

    state.rumbaVX += ax; state.rumbaVY += ay;
    var rumbaSpeed = vecLen(state.rumbaVX, state.rumbaVY);
    if (rumbaSpeed > config.RUMBA_MAX_SPEED) {
      var n = normalize(state.rumbaVX, state.rumbaVY);
      state.rumbaVX = n[0] * config.RUMBA_MAX_SPEED;
      state.rumbaVY = n[1] * config.RUMBA_MAX_SPEED;
    }

    state.rumbaVX *= config.RUMBA_FRICTION; state.rumbaVY *= config.RUMBA_FRICTION;

    if (vecLen(state.rumbaVX, state.rumbaVY) > 0.3) {
      var facing = normalize(state.rumbaVX, state.rumbaVY);
      state.rumbaFacingX = facing[0]; state.rumbaFacingY = facing[1];
      if (state.rumbaFacingX < -0.4) state.dragFlipped = true;
      else if (state.rumbaFacingX > 0.4) state.dragFlipped = false;
    }

    state.rumbaX += state.rumbaVX; state.rumbaY += state.rumbaVY;
    state.rumbaX = clamp(state.rumbaX, config.RUMBA_RADIUS, config.GW - config.RUMBA_RADIUS);
    state.rumbaY = clamp(state.rumbaY, config.RUMBA_RADIUS, config.GH - config.RUMBA_RADIUS);

    for (var oi = 0; oi < OBSTACLES.length; oi++) {
      var obstacle = OBSTACLES[oi];
      var resolved = obstacle.shape === "rect"
        ? resolveCircleRect(state.rumbaX, state.rumbaY, config.RUMBA_RADIUS, state.rumbaVX, state.rumbaVY, obstacle.rect)
        : circleCircleResolve(state.rumbaX, state.rumbaY, config.RUMBA_RADIUS, state.rumbaVX, state.rumbaVY, obstacle.pos[0], obstacle.pos[1], obstacle.radius);
      state.rumbaX = resolved.cx; state.rumbaY = resolved.cy;
      state.rumbaVX = resolved.vx; state.rumbaVY = resolved.vy;
    }

    if (state.attached) {
      var cs = charSize(state);
      var targetX = state.rumbaX - cs * 1.33;
      var targetY = state.rumbaY - cs * 0.75;
      state.charVX = (targetX - state.charX) * 0.4 + state.rumbaVX * 0.6;
      state.charVY = (targetY - state.charY) * 0.4 + state.rumbaVY * 0.6;

      var dragMaxSpeed = config.DRAG_SPEED_BASE - state.macaronsEaten * config.DRAG_SPEED_PENALTY;
      var dragSpeed = vecLen(state.charVX, state.charVY);
      if (dragSpeed > dragMaxSpeed) {
        state.charVX = state.charVX / dragSpeed * dragMaxSpeed;
        state.charVY = state.charVY / dragSpeed * dragMaxSpeed;
      }
    } else {
      state.charVX *= config.CHAR_FRICTION;
      state.charVY *= config.CHAR_FRICTION;
    }

    state.charX += state.charVX; state.charY += state.charVY;
    var csNow = charSize(state);

    if (state.attached) {
      var dRect = dragDrawRect(state, images, state.charX, state.charY);
      if (dRect.x < 0) state.charX -= dRect.x;
      if (dRect.y < 0) state.charY -= dRect.y;
      if (dRect.x + dRect.w > config.GW) state.charX -= dRect.x + dRect.w - config.GW;
      if (dRect.y + dRect.h > config.GH) state.charY -= dRect.y + dRect.h - config.GH;
    } else {
      state.charX = clamp(state.charX, 0, config.GW - csNow);
      state.charY = clamp(state.charY, 0, config.GH - csNow);
    }

    var charRect = { x: state.charX, y: state.charY, w: csNow, h: csNow };
    for (var wi = 0; wi < OBSTACLES.length; wi++) {
      if (OBSTACLES[wi].shape !== "rect") continue;
      if (state.attached) {
        var dr = dragDrawRect(state, images, state.charX, state.charY);
        var res = rectRectResolve({ x: dr.x, y: dr.y, w: dr.w, h: dr.h }, state.charVX, state.charVY, OBSTACLES[wi].rect);
        state.charX = res.r.x - dr.dx; state.charY = res.r.y - dr.dy;
        charRect = { x: state.charX, y: state.charY, w: csNow, h: csNow };
        state.charVX = res.vx; state.charVY = res.vy;
      } else {
        var res2 = rectRectResolve({ x: charRect.x, y: charRect.y, w: charRect.w, h: charRect.h }, state.charVX, state.charVY, OBSTACLES[wi].rect);
        charRect = res2.r; state.charVX = res2.vx; state.charVY = res2.vy;
      }
    }
    state.charX = charRect.x; state.charY = charRect.y;

    for (var ci = 0; ci < OBSTACLES.length; ci++) {
      if (OBSTACLES[ci].shape !== "circle") continue;
      if (state.attached) {
        var dr2 = dragDrawRect(state, images, state.charX, state.charY);
        var res3 = resolveCharCircle(dr2.x, dr2.y, dr2.w, dr2.h, state.charVX, state.charVY, OBSTACLES[ci].pos[0], OBSTACLES[ci].pos[1], OBSTACLES[ci].radius);
        state.charX = res3.cx - dr2.dx; state.charY = res3.cy - dr2.dy;
        state.charVX = res3.vx; state.charVY = res3.vy;
      } else {
        var res4 = resolveCharCircle(state.charX, state.charY, csNow, csNow, state.charVX, state.charVY, OBSTACLES[ci].pos[0], OBSTACLES[ci].pos[1], OBSTACLES[ci].radius);
        state.charX = res4.cx; state.charY = res4.cy; state.charVX = res4.vx; state.charVY = res4.vy;
      }
    }

    for (var mi = 0; mi < state.macarons.length; mi++) {
      var mac = state.macarons[mi];
      mac.pos[0] += mac.vx; mac.pos[1] += mac.vy;
      if (mac.pos[0] < 20 || mac.pos[0] > config.GW - 20) { mac.vx *= -1; mac.pos[0] = clamp(mac.pos[0], 20, config.GW - 20); }
      if (mac.pos[1] < 20 || mac.pos[1] > config.GH - 20) { mac.vy *= -1; mac.pos[1] = clamp(mac.pos[1], 20, config.GH - 20); }
    }

    if (state.hasBeenAttached && !state.attached) {
      var closestDistance = 99999, closestIndex = -1;
      var cx = state.charX + csNow / 2, cy = state.charY + csNow / 2;

      for (var di = 0; di < state.macarons.length; di++) {
        var distance = vecLen(state.macarons[di].pos[0] - cx, state.macarons[di].pos[1] - cy);
        if (distance < closestDistance) { closestDistance = distance; closestIndex = di; }
      }

      if (closestIndex !== -1) {
        var radius = macaronRadius(images, state.macarons[closestIndex].imgIdx);
        var attractRange = radius + csNow / 2;
        var eatRange = radius + csNow / 4;

        if (closestDistance < attractRange) {
          var target = state.macarons[closestIndex];
          var nrm = normalize(target.pos[0] - cx, target.pos[1] - cy);
          state.charVX += nrm[0] * config.MACARON_ATTRACT_FORCE;
          state.charVY += nrm[1] * config.MACARON_ATTRACT_FORCE;

          if (closestDistance < eatRange) {
            state.macarons.splice(closestIndex, 1);
            state.macaronsEaten += 1;
            audio.playCollect();
            if (state.macaronsEaten >= 3) {
              state.gameState = "gameover"; state.attached = false;
              audio.stopCrying(); state.screenShake = 0;
              state.gameOverTime = performance.now();
              setTimeout(function() { if (opts.onGameOver) opts.onGameOver(state.elapsedTime); }, 7000);
              return;
            }
          }
        }
      }
    }

    var charCenterX = state.charX + csNow / 2;
    var charCenterY = state.charY + csNow / 2;
    var rumbaDistance = vecLen(charCenterX - state.rumbaX, charCenterY - state.rumbaY);

    if (state.attached) {
      for (var ai = 0; ai < state.macarons.length; ai++) {
        var mRad = macaronRadius(images, state.macarons[ai].imgIdx);
        if (vecLen(state.macarons[ai].pos[0] - charCenterX, state.macarons[ai].pos[1] - charCenterY) < mRad + csNow / 2) {
          state.attached = false;
          state.slipTimer = config.SLIP_DURATION_SEC * 1.5;
          state.reattachCooldown = config.REATTACH_COOLDOWN_SEC;
          audio.playSlip(); state.screenShake = 0.15; break;
        }
      }
    }

    if (state.slipTimer > 0) state.attached = false;

    if (!state.attached && state.slipTimer === 0 && state.reattachCooldown === 0 && rumbaDistance <= config.ATTACH_RANGE) {
      state.attached = true; state.hasBeenAttached = true;
      state.dragAnimTimer = config.DRAG_ANIM_DURATION;
      audio.playConnect();
    }

    if (state.attached && rumbaDistance >= config.DETACH_RANGE) {
      state.attached = false; audio.playSlip(); state.screenShake = 0.1;
    }

    if (state.attached) {
      var ropeX = state.charX + csNow / 2;
      var ropeY = state.charY + csNow / 2;
      var segments = 6;
      state.ropePoints = [];
      for (var si = 0; si <= segments; si++) {
        var t = si / segments;
        var rx = lerp(state.rumbaX, ropeX, t);
        var ry = lerp(state.rumbaY, ropeY, t);
        var sag = Math.sin(t * Math.PI) * 12;
        state.ropePoints.push([rx, ry + sag]);
      }
    } else { state.ropePoints = []; }

    if (state.attached && state.dragAnimTimer <= 0) audio.startCrying();
    else audio.stopCrying();

    if (state.cryingTimerActive && state.attached) {
      state.cryingTimer -= dt;
      if (state.cryingTimer <= 0) {
        state.attached = false;
        state.slipTimer = config.SLIP_DURATION_SEC;
        state.reattachCooldown = config.REATTACH_COOLDOWN_SEC;
        audio.stopCrying(); audio.playSlip(); state.screenShake = 0.12;
      }
    }

    if (rectsCollide({ x: state.charX, y: state.charY, w: csNow, h: csNow }, EXIT_RECT)) {
      state.gameState = "cleared"; state.attached = false; state.slipTimer = 0;
      state.clearTime = performance.now();
      if (state.bestTime === 0 || state.elapsedTime < state.bestTime) {
        state.bestTime = state.elapsedTime;
        localStorage.setItem("npochamu_best", state.bestTime.toString());
      }
      audio.playClear(); spawnConfetti(state, 60);
      setTimeout(function() { if (opts.onClear) opts.onClear(state.elapsedTime); }, 4000);
    }

    updateParticles(state, dt);
    updateEffects(dt);
  }

  return { handleKeyDown: handleKeyDown, resetGame: resetGame, update: update };
}

(function() {

      'KAI','LEO','MAX','NEO','OAK','PAT','RAY','SAM','TOM','VIC',
      'WAL','YUI','ZAK','AMI','BEN','CUP','DOC','EVE','FIN','GIN',
      'HOP','ICE','JOE','KEN','LUC','MAO','NED','OWL','PEN','RIN',
      'SKY','TAO','UMI','VAN','WIZ','YAM','ZEN','APE','BAT','COW'
    ];
    var entries = [];
    for (var i = 0; i < names.length; i++) {
      var base = 15 + (i / names.length) * 120;
      var jitter = (Math.sin(i * 137.5) * 0.5 + 0.5) * 10;
      entries.push({ name: names[i], score: parseFloat((base + jitter).toFixed(1)) });
    }
    entries.sort(function(a, b) { return a.score - b.score; });
    return entries;
  }

  function loadRank() {
    if (cachedRank.length > 0) return cachedRank;
    try {
      var raw = localStorage.getItem(RANK_KEY);
      cachedRank = raw ? JSON.parse(raw) : [];
    } catch(e) { cachedRank = []; }
    if (cachedRank.length === 0) cachedRank = generateDummyRanking();
    return cachedRank;
  }

  function saveRank(r) {
    cachedRank = r;
    localStorage.setItem(RANK_KEY, JSON.stringify(r));
  }

  function isHighScore(score) {
    var r = loadRank();
    if (r.length < RANK_MAX) return true;
    return score < r[RANK_MAX - 1].score;
  }

  function addRankScore(name, score) {
    var r = loadRank().slice();
    r.push({ name: name, score: score });
    r.sort(function(a, b) { return a.score - b.score; });
    saveRank(r);
    return r;
  }

  function formatTime(s) {

    var sec = String(Math.floor(s) % 60).padStart(2, '0');
    return min + ':' + sec;
  }

      el.textContent = RANK_LETTERS[rankSlotValues[i]];
      el.classList.toggle('active', i === rankActiveSlot);

    var sec = String(Math.floor(score) % 60).padStart(2, '0');
    document.getElementById('result-time').textContent = 'クリアタイム: ' + min + ':' + sec;

    var currentRanks = loadRank();
    var myRank = currentRanks.filter(function(e) { return e.score < score; }).length + 1;
    document.getElementById('result-rank-label').textContent = myRank + '位';

    if (isHighScore(score)) {
      rankNameArea.classList.add('active');
      rankListArea.classList.remove('active');
      rankSlotValues = [0, 0, 0];
      rankActiveSlot = 0;
      updateRankSlots();
    } else {
      rankNameArea.classList.remove('active');
      addRankScore('-', score);
      displayRank(loadRank());
    }

    resultScreen.classList.add('active');
  }

  function submitRankName() {
    var name = getRankName();
    if (RANK_BAD.indexOf(name) !== -1) {
      rankSlots.forEach(function(el) { el.style.color = '#ff4444'; });
      setTimeout(function() { rankSlots.forEach(function(el) { el.style.color = ''; }); }, 400);
      return;
    }
    var r = addRankScore(name, rankScore);
    rankNameArea.classList.remove('active');
    displayRank(r);
  }

  function displayRank(rankings) {
    rankListArea.classList.add('active');
    rankListOl.innerHTML = '';
    var top = rankings.slice(0, RANK_MAX);
    var highlighted = false;
    for (var i = 0; i < top.length; i++) {
      var li = document.createElement('li');
      li.textContent = (i + 1) + '位  ' + top[i].name.padEnd(3, '.') + '  ' + formatTime(top[i].score);
      if (!highlighted && Math.abs(top[i].score - rankScore) < 0.01) {
        li.classList.add('hl');
        highlighted = true;
      }
      rankListOl.appendChild(li);
    }
  }

  function hideRanking() {
    resultScreen.classList.remove('active');
    rankNameArea.classList.remove('active');
    rankListArea.classList.remove('active');
    rankEntering = false;
  }

  rankSubmitBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    submitRankName();
  });

  rankSlots.forEach(function(el, i) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      rankActiveSlot = i;
      rankSlotValues[i] = (rankSlotValues[i] + 1) % RANK_LETTERS.length;
      updateRankSlots();
    });
  });

  loadRank();

  document.addEventListener('keydown', function(e) {
    if (!rankEntering) return;
    var nameVisible = rankNameArea.classList.contains('active');
    if (nameVisible) {
      if (e.key === 'ArrowUp') {
        e.preventDefault(); e.stopPropagation();
        rankSlotValues[rankActiveSlot] = (rankSlotValues[rankActiveSlot] + 1) % RANK_LETTERS.length;
        updateRankSlots();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault(); e.stopPropagation();
        rankSlotValues[rankActiveSlot] = (rankSlotValues[rankActiveSlot] - 1 + RANK_LETTERS.length) % RANK_LETTERS.length;
        updateRankSlots();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault(); e.stopPropagation();
        rankActiveSlot = Math.min(rankActiveSlot + 1, 2);
        updateRankSlots();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault(); e.stopPropagation();
        rankActiveSlot = Math.max(rankActiveSlot - 1, 0);
        updateRankSlots();
      } else if (e.key === 'Enter') {
        e.preventDefault(); e.stopPropagation();
        submitRankName();
      }
    } else {
      if (e.code === 'Space' || e.key === 'Enter' || e.code === 'Escape') {
        e.preventDefault(); e.stopPropagation();
        window.location.href = '../';
      }
    }
  }, true);  // use capture to intercept before game handlers

  resultScreen.addEventListener('pointerdown', function(e) { e.stopPropagation(); });
  resultScreen.addEventListener('click', function(e) { e.stopPropagation(); });

  var assets = createAssets();
  var audio = createAudioController(state);
  var game = null;

  var input = createInput({
    canvas: canvas, state: state, audio: audio,
    onKeyDown: function(code) { if (game) game.handleKeyDown(code); },
    onResetGame: function() { if (game) game.resetGame(); },
  });

  function showGameOver(score) {
    rankScore = score;
    rankEntering = true;
    var min = String(Math.floor(score / 60)).padStart(2, '0');
    var sec = String(Math.floor(score) % 60).padStart(2, '0');
    document.getElementById('result-time').textContent = 'タイム: ' + min + ':' + sec;
    document.getElementById('result-rank-label').textContent = 'GAME OVER';
    rankNameArea.classList.remove('active');
    rankListArea.classList.remove('active');
    displayRank(loadRank());
    resultScreen.classList.add('active');
  }

  game = createGame({ state: state, images: assets.images, audio: audio, input: input, onClear: showRanking, onGameOver: showGameOver });

  var renderer = createRenderer({ canvas: canvas, ctx: ctx, state: state, images: assets.images });

  window.addEventListener("resize", renderer.resize);
  renderer.resize();

  var homeBtnEl = document.querySelector('.home-btn');
  var homeBtnSelected = false;

  function updateHomeBtnHighlight() {
    homeBtnEl.classList.toggle('kb-selected', homeBtnSelected);
  }

  document.addEventListener('keydown', function(e) {
    if (state.gameState !== 'title') return;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      homeBtnSelected = true;
      updateHomeBtnHighlight();
    } else if (e.key === 'Enter' && homeBtnSelected) {
      e.preventDefault();
      window.location.href = '../';
    }
  });

  canvas.addEventListener('pointerdown', function() {
    homeBtnSelected = false;
    updateHomeBtnHighlight();
  });

  function loop(timestamp) {
    var dt = Math.min((timestamp - state.lastTime) / 1000, 0.05);
    state.lastTime = timestamp;
    game.update(dt);
    renderer.draw(timestamp);
    var isTitle = state.gameState === 'title';
    homeBtnEl.classList.toggle('visible', isTitle);
    if (!isTitle) { homeBtnSelected = false; updateHomeBtnHighlight(); }
    requestAnimationFrame(loop);
  }

  assets.loadImages(function() {
    state.lastTime = performance.now();
    requestAnimationFrame(loop);
  });
})();
  </script>
</body>

</html>
